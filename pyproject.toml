[project]
name = "repo-brain"
version = "0.1.0"
description = "Local repository intelligence for coding agents"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "tree-sitter-language-pack>=0.9.0",
]

[project.optional-dependencies]
mcp = ["mcp>=1.0"]
dev = [
  "mypy>=1.15",
  "pytest>=8.3",
  "ruff>=0.11",
]

[project.scripts]
repo-brain = "repo_brain.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/repo_brain"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.12"
strict = true
packages = ["repo_brain"]
mypy_path = "src"


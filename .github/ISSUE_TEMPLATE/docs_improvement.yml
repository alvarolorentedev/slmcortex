name: Docs improvement
description: Suggest an improvement to the README, examples, release docs, or architecture docs.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: problem
    attributes:
      label: What was unclear?
      description: Describe the missing, confusing, or misleading documentation.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: What would make the docs clearer for the next reader?
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Relevant files or sections
      description: Point to the README, docs page, command help, or workflow that needs improvement.

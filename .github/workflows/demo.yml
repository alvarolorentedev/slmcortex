name: Demo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  demo:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'

      - name: Validate no-model demo
        run: pytest tests/test_skillcortex_demo.py -q

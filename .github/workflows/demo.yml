name: Demo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  demo:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'

      - name: Validate no-model demo
        run: pytest tests/cli/test_skillcortex_demo.py -k 'demo_script_runs_end_to_end or arbitrary_skill_smoke_script_runs_default_no_model_loop' -q

      - name: Validate adaptive mock demo
        run: pytest tests/cli/test_skillcortex_demo.py -k dynamic_adaptive_smoke_script_runs_mock_loop -q

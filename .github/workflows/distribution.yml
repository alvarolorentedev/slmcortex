name: Distribution Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  distribution-smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'

      - name: Validate packaged install smoke
        run: python scripts/run_packaged_install_smoke.py --package-source .

      - name: Validate external workspace smoke
        if: matrix.os == 'macos-latest'
        run: python scripts/run_package_product_smoke.py
